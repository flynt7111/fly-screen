<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fly Screen</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Video display -->
  <video id="videoDisplay" autoplay muted></video>

  <!-- No signal overlay -->
  <div id="noSignal">
    <div class="no-signal-content">
      <div class="no-signal-icon">📺</div>
      <div class="no-signal-text">No Signal</div>
      <div class="no-signal-hint">Click the menu button to select a video source</div>
    </div>
  </div>

  <!-- Floating menu button -->
  <div id="floatingBtn" title="Menu">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </div>

  <!-- Context menu -->
  <div id="contextMenu" class="hidden">
    <div class="menu-header">Fly Screen v1.0</div>
    <div class="menu-item has-submenu" id="videoSourcesBtn">
      Video Sources
      <span class="submenu-arrow">▸</span>
    </div>
    <!-- Video sources submenu -->
    <div id="videoSourcesSubmenu" class="submenu hidden">
      <div class="menu-item submenu-loading">Scanning devices...</div>
    </div>
    <div class="menu-separator"></div>
    <div class="menu-item" id="exitBtn">Exit</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
